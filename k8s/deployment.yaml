apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-app
  labels:
    app: apache-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apache-app
  template:
    metadata:
      labels:
        app: apache-app
    spec:
      containers:
        - name: apache
          image: TU_USUARIO_DOCKERHUB/apache-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80